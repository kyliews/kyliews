name: Update GitHub Stats Images

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Gera card stats para tema claro
      - name: Gerar stats (claro)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: |
            username=${{ github.repository_owner }}&
            show_icons=true&
            count_private=true&
            hide_border=true&
            theme=default
          path: images/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Gera card stats para tema escuro
      - name: Gerar stats (escuro)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: |
            username=${{ github.repository_owner }}&
            show_icons=true&
            count_private=true&
            hide_border=true&
            theme=radical
          path: images/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Gera top-langs claro
      - name: Gerar top-langs (claro)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: |
            username=${{ github.repository_owner }}&
            layout=compact&
            count_private=true&
            hide_border=true&
            theme=default
          path: images/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Gera top-langs escuro
      - name: Gerar top-langs (escuro)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: |
            username=${{ github.repository_owner }}&
            layout=compact&
            count_private=true&
            hide_border=true&
            theme=radical
          path: images/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*.svg
          git commit -m "Atualização automática dos cards de estatísticas" || exit 0
          git push