name: Update GitHub Stats Images

on:
  schedule:
    - cron: '0 0 * * *'  # Executa diariamente à meia-noite
  workflow_dispatch:     # Permite execução manual

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Permissão essencial para fazer o commit dos SVGs gerados
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Gerar card de estatísticas gerais
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: |
            username=${{ github.repository_owner }}&
            show_icons=true&
            count_private=true&
            hide_border=true
          path: images/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens mais usadas
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: |
            username=${{ github.repository_owner }}&
            layout=compact&
            count_private=true&
            hide_border=true
          path: images/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commitar e fazer push das imagens geradas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*.svg
          git commit -m "Atualização automática dos cards de estatísticas" || exit 0
          git push